@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --ink:#0B1220; --panel:#131C2B; --panel2:#0F1826; --line:#263349;
  --text:#E8EEF6; --dim:#8FA3BC; --faint:#5C7089;
  --amber:#FFB020; --amber-dk:#3A2C0B;
  --cyan:#4CC3E8; --cyan-dk:#0E2A38;
  --red:#F0524F; --red-dk:#3A1512;
  --green:#3ECF8E; --green-dk:#0E2F22;
  --disp:'Barlow Condensed',sans-serif; --body:'Barlow',sans-serif; --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:var(--ink);color:var(--text);font-family:var(--body);font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:var(--body);font-size:15px;color:var(--text);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;width:100%;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(255,176,32,.18)}
textarea{resize:vertical;min-height:72px;line-height:1.45}
::placeholder{color:var(--faint)}
.app{max-width:860px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.eyebrow{font-family:var(--disp);font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--dim)}
.h-disp{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.mono{font-family:var(--mono)}

/* top bar */
.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(var(--ink),rgba(11,18,32,.94));backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px}
.topbar .crest{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.03em;background:var(--red);color:#fff;flex-shrink:0}
.timer{margin-left:auto;text-align:right}
.timer .t{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--amber)}

/* tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 0;border-bottom:1px solid var(--line);scrollbar-width:none;position:sticky;top:63px;z-index:39;background:var(--ink)}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:14px;color:var(--dim);padding:10px 14px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;white-space:nowrap}
.tab.on{color:var(--amber);background:var(--panel);border-color:var(--line)}
.tab .cnt{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:6px}

.main{flex:1;padding:16px;padding-bottom:90px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:17px;margin-bottom:4px}
.card .sub{color:var(--dim);font-size:13px;margin-bottom:12px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1;min-width:130px}
.field{margin-bottom:12px}
.field label{display:block;font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:11.5px;color:var(--dim);margin-bottom:5px}

.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:14px;padding:11px 16px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--text)}
.btn:active{transform:translateY(1px)}
.btn.amber{background:var(--amber);border-color:var(--amber);color:#1A1200}
.btn.red{background:var(--red);border-color:var(--red);color:#fff}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 11px;font-size:12.5px}
.btn:disabled{opacity:.45;cursor:default}

.chip{display:inline-flex;align-items:center;font-family:var(--disp);font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:12.5px;padding:7px 12px;border-radius:999px;border:1px solid var(--line);color:var(--dim);margin:0 6px 6px 0}
.chip.on{border-color:var(--amber);color:var(--amber);background:rgba(255,176,32,.08)}
.yn{display:flex;gap:6px}
.yn .chip{margin:0}

/* checklist */
.ck{display:flex;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line);align-items:flex-start}
.ck:last-child{border-bottom:none}
.ck .box{width:26px;height:26px;border-radius:7px;border:2px solid var(--faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;margin-top:1px}
.ck.done .box{background:var(--green);border-color:var(--green);color:#04170E}
.ck .txt{flex:1;line-height:1.4}
.ck.done .txt{color:var(--dim)}
.ck .stamp{font-family:var(--mono);font-size:11px;color:var(--green)}

/* command board \u2014 signature element */
.board-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.board-legend .lg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
.dot{width:10px;height:10px;border-radius:3px}
.unit{background:var(--panel);border:1px solid var(--line);border-left:6px solid var(--faint);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.unit.s-disp{border-left-color:var(--dim)}
.unit.s-enr{border-left-color:var(--cyan)}
.unit.s-scene{border-left-color:var(--amber)}
.unit.s-asgn{border-left-color:var(--green)}
.unit.s-rel{border-left-color:var(--faint);opacity:.55}
.unit .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.unit .nm{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:17px}
.unit .as{font-size:12.5px;color:var(--dim);flex:1;min-width:140px}
.unit .assign-slot{margin-top:9px;border:1px dashed var(--line);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;min-height:38px}
.unit .assign-slot.filled{border-style:solid;border-color:var(--green);background:rgba(62,207,142,.07)}
.unit .assign-slot .a{font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:14px;color:var(--green)}
.statusrail{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.statusrail .st{font-family:var(--disp);font-weight:600;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;padding:6px 10px;border-radius:7px;border:1px solid var(--line);color:var(--faint)}
.statusrail .st.on{border-color:var(--amber);color:var(--amber);background:rgba(255,176,32,.08)}
.unit .times{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:7px;display:flex;gap:12px;flex-wrap:wrap}

/* voice */
.voice{margin-top:8px}
.recbar{display:flex;align-items:center;gap:10px}
.recdot{width:10px;height:10px;border-radius:50%;background:var(--red);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.2}}
.memo{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:8px}
.memo .lbl{flex:1;font-size:13px;color:var(--dim)}
audio{height:34px;max-width:220px}

/* home */
.hero{padding:26px 16px 8px}
.hero h1{font-family:var(--disp);font-weight:700;text-transform:uppercase;font-size:34px;line-height:1.02;letter-spacing:.02em}
.hero h1 .accent{color:var(--amber)}
.newgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
@media(max-width:560px){.newgrid{grid-template-columns:1fr}}
.newbtn{text-align:left;border:1px solid var(--line);border-radius:14px;padding:18px;background:var(--panel);position:relative;overflow:hidden}
.newbtn .ic{font-size:26px;margin-bottom:10px;display:block}
.newbtn .t{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:19px;display:block}
.newbtn .d{color:var(--dim);font-size:13px;margin-top:4px;display:block;line-height:1.4}
.newbtn.lake{border-top:4px solid var(--cyan)}
.newbtn.mp{border-top:4px solid var(--amber)}
.inclist .inc{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 14px;margin-bottom:9px;width:100%;text-align:left}
.inc .badge{font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:5px 9px;border-radius:6px;flex-shrink:0}
.badge.lake{background:var(--cyan-dk);color:var(--cyan)}
.badge.mp{background:var(--amber-dk);color:var(--amber)}
.inc .nm{font-weight:600}
.inc .meta{font-family:var(--mono);font-size:11px;color:var(--faint)}
.inc .stat{margin-left:auto;font-family:var(--disp);font-weight:600;font-size:12px;letter-spacing:.07em;text-transform:uppercase}
.stat.active{color:var(--green)} .stat.closed{color:var(--faint)}

.logline{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.logline:last-child{border:none}
.logline .lt{font-family:var(--mono);font-size:11.5px;color:var(--amber);flex-shrink:0;padding-top:2px}
.bench{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.savebar{position:fixed;bottom:0;left:0;right:0;background:rgba(11,18,32,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:50}
.savebar .inner{max-width:860px;margin:0 auto;display:flex;gap:10px;align-items:center;width:100%}
.savestat{font-family:var(--mono);font-size:11px;color:var(--faint)}
.qref{background:var(--cyan-dk);border:1px solid rgba(76,195,232,.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13.5px;line-height:1.5;color:#BFE6F5}
.qref b{color:var(--cyan)}
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--green);color:#04170E;font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:10px 18px;border-radius:9px;z-index:60}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
